services:
  engine:
    build: .
    container_name: kerykeion_engine 
    restart: always
    ports:
      - "8001:8000" 
    networks:
      - astro-network 
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    volumes:
      # Монтируем код внутрь контейнера
      # Теперь файл major_cities.json сохранится на вашем диске
      - ./:/app

networks:
  astro-network:
    external: true 